<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>PINAM</title>
  <!-- Hack — closest to Hack Nerd Font via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hack-font@3.3.0/build/web/hack.css"/>
  <link rel="stylesheet" href="style.css"/>
  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="plugin">

  <!-- 3D viewport — fills everything above the controls strip -->
  <div id="viewport">
    <canvas id="webgl-canvas"></canvas>

    <!-- Corner anchors -->
    <div class="cnr" id="cnr-tl">
      <span class="cnr-text">TONEKEEP</span>
      <span class="cnr-sub">V0.1</span>
    </div>
    <div class="cnr" id="cnr-tr"></div>

    <span id="load-status"></span>

  </div>

  <!-- Controls strip — 8 Valhalla-style rotary knobs -->
  <div id="controls">

    <!-- Knob macro:
         SVG viewBox 0 0 60 60.
         k-body  = filled circle (r=26, face of the knob)
         k-notch = indicator mark that rotates (transform set by JS)
         JUCE HOOK: /pinam/<param> float [0–1]
    -->

    <div class="k" data-group="input">
      <span class="k-lbl">IN GAIN</span>
      <svg class="knob-svg" viewBox="0 0 60 60" data-param="inputGain" data-default="0.5">
        <circle class="k-body" cx="30" cy="30" r="26"/>
        <rect   class="k-notch" x="27" y="3" width="6" height="16" rx="1" transform="rotate(-135 30 30)"/>
      </svg>
      <span class="k-val" id="val-inputGain">050</span>
    </div>

    <div class="k">
      <span class="k-lbl">VOLUME</span>
      <svg class="knob-svg" viewBox="0 0 60 60" data-param="volume" data-default="0.6">
        <circle class="k-body" cx="30" cy="30" r="26"/>
        <rect   class="k-notch" x="27" y="3" width="6" height="16" rx="1" transform="rotate(-135 30 30)"/>
      </svg>
      <span class="k-val" id="val-volume">060</span>
    </div>

    <div class="k">
      <span class="k-lbl">TREBLE</span>
      <svg class="knob-svg" viewBox="0 0 60 60" data-param="treble" data-default="0.5">
        <circle class="k-body" cx="30" cy="30" r="26"/>
        <rect   class="k-notch" x="27" y="3" width="6" height="16" rx="1" transform="rotate(-135 30 30)"/>
      </svg>
      <span class="k-val" id="val-treble">050</span>
    </div>

    <div class="k">
      <span class="k-lbl">BASS</span>
      <svg class="knob-svg" viewBox="0 0 60 60" data-param="bass" data-default="0.5">
        <circle class="k-body" cx="30" cy="30" r="26"/>
        <rect   class="k-notch" x="27" y="3" width="6" height="16" rx="1" transform="rotate(-135 30 30)"/>
      </svg>
      <span class="k-val" id="val-bass">050</span>
    </div>

    <div class="k">
      <span class="k-lbl">REVERB</span>
      <svg class="knob-svg" viewBox="0 0 60 60" data-param="reverb" data-default="0.3">
        <circle class="k-body" cx="30" cy="30" r="26"/>
        <rect   class="k-notch" x="27" y="3" width="6" height="16" rx="1" transform="rotate(-135 30 30)"/>
      </svg>
      <span class="k-val" id="val-reverb">030</span>
    </div>

    <div class="k">
      <span class="k-lbl">RATE</span>
      <svg class="knob-svg" viewBox="0 0 60 60" data-param="rate" data-default="0.2">
        <circle class="k-body" cx="30" cy="30" r="26"/>
        <rect   class="k-notch" x="27" y="3" width="6" height="16" rx="1" transform="rotate(-135 30 30)"/>
      </svg>
      <span class="k-val" id="val-rate">020</span>
    </div>

    <div class="k">
      <span class="k-lbl">DEPTH</span>
      <!-- depth drives water displacement — linked to 3D scene -->
      <svg class="knob-svg" viewBox="0 0 60 60" data-param="depth" data-default="0">
        <circle class="k-body" cx="30" cy="30" r="26"/>
        <rect   class="k-notch" x="27" y="3" width="6" height="16" rx="1" transform="rotate(-135 30 30)"/>
      </svg>
      <span class="k-val" id="val-depth">000</span>
    </div>

    <div class="k" data-group="output">
      <span class="k-lbl">OUT GAIN</span>
      <svg class="knob-svg" viewBox="0 0 60 60" data-param="outputGain" data-default="0.7">
        <circle class="k-body" cx="30" cy="30" r="26"/>
        <rect   class="k-notch" x="27" y="3" width="6" height="16" rx="1" transform="rotate(-135 30 30)"/>
      </svg>
      <span class="k-val" id="val-outputGain">070</span>
    </div>

  </div><!-- /#controls -->

</div><!-- /#plugin -->

<script type="module" src="main.js"></script>
</body>
</html>
