<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PINAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- Plugin outer shell — fixed 880×480, mimics a hardware faceplate -->
  <div id="plugin">

    <!-- ── Header bar ─────────────────────────────────────────── -->
    <header id="plugin-header">
      <span id="logo">PINAM</span>
      <span id="header-mid">AMP NEURAL MODELER</span>
      <span id="build-tag">V0.1 PROTOTYPE</span>
    </header>

    <!-- ── 3D viewport ────────────────────────────────────────── -->
    <div id="viewport">
      <canvas id="webgl-canvas"></canvas>
      <div id="load-overlay">
        <span id="load-status">INITIALISING</span>
      </div>
    </div>

    <!-- ── Controls strip ────────────────────────────────────── -->
    <footer id="controls">

      <!-- GAIN -------------------------------------------------- -->
      <div class="knob-cell" id="cell-gain">
        <div class="knob-wrap">
          <!--
            SVG knob — 270° sweep, starts bottom-left, ends bottom-right.
            JUCE hook: /pinam/gain  float [0,1]
          -->
          <svg class="knob-svg" viewBox="0 0 64 64" data-param="gain" data-default="0.5">
            <circle class="k-track" cx="32" cy="32" r="24"/>
            <circle class="k-arc"   cx="32" cy="32" r="24"/>
            <circle class="k-dot"   cx="32" cy="8"  r="3"/>
          </svg>
        </div>
        <div class="knob-label">GAIN</div>
        <div class="knob-val" id="val-gain">50</div>
      </div>

      <div class="knob-divider"></div>

      <!-- VCA THUMP — drives water displacement ------------------- -->
      <div class="knob-cell" id="cell-thump">
        <div class="knob-wrap">
          <!--
            JUCE hook: /pinam/vca_thump  float [0,1]
            Directly linked to water vertex displacement amplitude.
          -->
          <svg class="knob-svg" viewBox="0 0 64 64" data-param="thump" data-default="0">
            <circle class="k-track" cx="32" cy="32" r="24"/>
            <circle class="k-arc"   cx="32" cy="32" r="24"/>
            <circle class="k-dot"   cx="32" cy="8"  r="3"/>
          </svg>
        </div>
        <div class="knob-label">VCA THUMP</div>
        <div class="knob-val" id="val-thump">00</div>
      </div>

      <div class="knob-divider"></div>

      <!-- SAG ---------------------------------------------------- -->
      <div class="knob-cell" id="cell-sag">
        <div class="knob-wrap">
          <!--
            JUCE hook: /pinam/sag  float [0,1]
          -->
          <svg class="knob-svg" viewBox="0 0 64 64" data-param="sag" data-default="0.25">
            <circle class="k-track" cx="32" cy="32" r="24"/>
            <circle class="k-arc"   cx="32" cy="32" r="24"/>
            <circle class="k-dot"   cx="32" cy="8"  r="3"/>
          </svg>
        </div>
        <div class="knob-label">SAG</div>
        <div class="knob-val" id="val-sag">25</div>
      </div>

    </footer>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
