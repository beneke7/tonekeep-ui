<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PINAM — AMP CONFIGURATOR</title>

  <!-- Monospace typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!--
    Three.js via importmap — all addons resolved under the same version
    so OBJLoader / OrbitControls / RoomEnvironment use a single bundle.
    JUCE integration: replace the CDN with a local vendored copy when
    shipping the plugin WebView.
  -->
  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">

    <!-- ═══════════════════════════════════════════════════
         LEFT SIDEBAR — telemetry read-outs
         JUCE hook: populate via WebSocket or OSC bridge
         ═══════════════════════════════════════════════════ -->
    <aside id="sidebar-left">
      <div class="panel-header">PINAM V0.1</div>

      <div class="tele-group">
        <div class="tele-row">
          <span class="tele-key">STATUS</span>
          <span class="tele-val" id="tele-status">LOADING</span>
        </div>
        <div class="tele-row">
          <span class="tele-key">INFERENCE</span>
          <span class="tele-val" id="tele-inference">1.33MS</span>
        </div>
        <div class="tele-row">
          <span class="tele-key">BUFFER</span>
          <span class="tele-val" id="tele-buffer">64</span>
        </div>
      </div>

      <div class="tele-divider"></div>

      <div class="tele-group">
        <div class="tele-row">
          <span class="tele-key">SAMPLERATE</span>
          <span class="tele-val" id="tele-sr">44100</span>
        </div>
        <div class="tele-row">
          <span class="tele-key">LATENCY</span>
          <span class="tele-val" id="tele-latency">2.9MS</span>
        </div>
        <div class="tele-row">
          <span class="tele-key">CLIP</span>
          <span class="tele-val" id="tele-clip">--</span>
        </div>
        <div class="tele-row">
          <span class="tele-key">FPS</span>
          <span class="tele-val" id="tele-fps">--</span>
        </div>
        <div class="tele-row">
          <span class="tele-key">FLUID CPU</span>
          <span class="tele-val" id="tele-fluid-cpu">0.00MS</span>
        </div>
      </div>
    </aside>

    <!-- ═══════════════════════════════════════════════════
         CENTER — WebGL canvas
         ═══════════════════════════════════════════════════ -->
    <main id="canvas-container">
      <!-- Three.js renders directly into this canvas -->
      <canvas id="webgl-canvas"></canvas>
      <div id="canvas-footer">
        <span id="load-status">AWAITING MODEL...</span>
      </div>
    </main>

    <!-- ═══════════════════════════════════════════════════
         RIGHT SIDEBAR — parameter sliders
         orient="vertical" targets Firefox; writing-mode
         targets Chrome/Safari (see style.css).
         JUCE HOOK: replace oninput with APVTS callbacks.
         ═══════════════════════════════════════════════════ -->
    <aside id="sidebar-right">
      <div class="panel-header">PARAMETERS</div>

      <!-- GAIN ─────────────────────────────────────────── -->
      <div class="param-block">
        <div class="param-header">
          <span class="param-label">GAIN</span>
          <!-- JUCE HOOK: /pinam/gain [0.0–1.0] normalized -->
          <span class="param-val" id="val-gain">050</span>
        </div>
        <div class="slider-wrap-v">
          <input
            type="range"
            id="slider-gain"
            class="slider-v"
            min="0" max="100" value="50"
            orient="vertical"
            aria-label="GAIN"
          />
        </div>
      </div>

      <div class="param-divider"></div>

      <!-- VCA THUMP — drives fluid Y-displacement ──────── -->
      <div class="param-block">
        <div class="param-header">
          <span class="param-label">VCA THUMP</span>
          <!-- JUCE HOOK: /pinam/vca_thump [0.0–1.0] normalized -->
          <span class="param-val" id="val-thump">000</span>
        </div>
        <div class="slider-wrap-v">
          <input
            type="range"
            id="slider-thump"
            class="slider-v"
            min="0" max="100" value="0"
            orient="vertical"
            aria-label="VCA THUMP"
          />
        </div>
      </div>

      <div class="param-divider"></div>

      <!-- SAG ──────────────────────────────────────────── -->
      <div class="param-block">
        <div class="param-header">
          <span class="param-label">SAG</span>
          <!-- JUCE HOOK: /pinam/sag [0.0–1.0] normalized -->
          <span class="param-val" id="val-sag">025</span>
        </div>
        <div class="slider-wrap-v">
          <input
            type="range"
            id="slider-sag"
            class="slider-v"
            min="0" max="100" value="25"
            orient="vertical"
            aria-label="SAG"
          />
        </div>
      </div>
    </aside>

  </div><!-- /#app -->

  <script type="module" src="main.js"></script>
</body>
</html>
